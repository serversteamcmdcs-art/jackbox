<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JoinBox — Войти в игру</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a0533;
    --card: #2a0f45;
    --accent: #ff3cac;
    --accent2: #ffcc00;
    --accent3: #00f5d4;
    --text: #fff;
    --muted: rgba(255,255,255,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(255,60,172,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(0,245,212,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 50%, rgba(255,204,0,0.05) 0%, transparent 70%);
    animation: bgPulse 8s ease-in-out infinite alternate;
    pointer-events: none;
  }

  @keyframes bgPulse {
    0% { opacity: 0.6; }
    100% { opacity: 1; }
  }

  /* Floating stars */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .star {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--dur) ease-in-out infinite alternate;
    opacity: 0.4;
  }
  @keyframes twinkle {
    0% { opacity: 0.1; transform: scale(0.8); }
    100% { opacity: 0.9; transform: scale(1.4); }
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* Logo */
  .logo {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(42px, 12vw, 64px);
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 4px;
    animation: logoIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .logo span:nth-child(1) { color: var(--accent); }
  .logo span:nth-child(2) { color: var(--accent2); }
  .logo span:nth-child(3) { color: var(--accent3); }
  .logo span:nth-child(4) { color: var(--accent); }
  .logo span:nth-child(5) { color: #fff; }
  .logo span:nth-child(6) { color: var(--accent2); }
  .logo span:nth-child(7) { color: var(--accent3); }

  @keyframes logoIn {
    0% { opacity: 0; transform: scale(0.5) rotate(-5deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  .tagline {
    font-size: 14px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 36px;
    animation: fadeUp 0.6s 0.3s both;
  }

  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(12px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* Card */
  .card {
    width: 100%;
    background: var(--card);
    border-radius: 24px;
    padding: 32px 28px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow:
      0 0 0 1px rgba(255,60,172,0.1),
      0 20px 60px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.05);
    animation: fadeUp 0.6s 0.5s both;
  }

  .label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 14px;
  }

  input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 16px 20px;
    font-family: 'Fredoka One', cursive;
    font-size: 28px;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: 8px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    caret-color: var(--accent);
  }
  input::placeholder {
    color: rgba(255,255,255,0.2);
    letter-spacing: 4px;
    font-size: 22px;
  }
  input:focus {
    border-color: var(--accent);
    background: rgba(255,60,172,0.08);
    box-shadow: 0 0 0 4px rgba(255,60,172,0.15);
  }

  .name-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 14px 20px;
    font-family: 'Nunito', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    caret-color: var(--accent3);
    margin-bottom: 24px;
  }
  .name-input::placeholder { color: rgba(255,255,255,0.25); }
  .name-input:focus {
    border-color: var(--accent3);
    background: rgba(0,245,212,0.06);
    box-shadow: 0 0 0 4px rgba(0,245,212,0.12);
  }

  .btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #c000a0);
    border: none;
    border-radius: 16px;
    padding: 18px;
    font-family: 'Fredoka One', cursive;
    font-size: 22px;
    color: #fff;
    cursor: pointer;
    letter-spacing: 1px;
    transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
    box-shadow: 0 6px 24px rgba(255,60,172,0.4);
    position: relative;
    overflow: hidden;
  }
  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    border-radius: inherit;
  }
  .btn:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 10px 32px rgba(255,60,172,0.55);
    filter: brightness(1.1);
  }
  .btn:active {
    transform: translateY(1px) scale(0.98);
    box-shadow: 0 4px 12px rgba(255,60,172,0.3);
  }
  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  /* Shake animation for error */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }
  .shake { animation: shake 0.4s ease; }

  .error {
    text-align: center;
    color: var(--accent);
    font-weight: 700;
    font-size: 13px;
    margin-top: 10px;
    min-height: 18px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .error.show { opacity: 1; }

  /* Bottom links */
  .footer {
    margin-top: 28px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    animation: fadeUp 0.6s 0.8s both;
    line-height: 1.8;
  }
  .footer a {
    color: var(--accent3);
    text-decoration: none;
    font-weight: 700;
  }
  .footer a:hover { text-decoration: underline; }

  /* Confetti burst on join */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 999;
    animation: confettiFall 1s ease-in forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(300px) rotate(720deg); opacity: 0; }
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 20px 0;
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.08);
  }

  /* Pulse dot */
  .live-dot {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--accent3);
    font-weight: 700;
    margin-bottom: 20px;
  }
  .live-dot::before {
    content: '';
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent3);
    box-shadow: 0 0 0 0 rgba(0,245,212,0.4);
    animation: livePulse 2s infinite;
  }
  @keyframes livePulse {
    0% { box-shadow: 0 0 0 0 rgba(0,245,212,0.4); }
    70% { box-shadow: 0 0 0 8px rgba(0,245,212,0); }
    100% { box-shadow: 0 0 0 0 rgba(0,245,212,0); }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
  <div class="logo">
    <span>J</span><span>o</span><span>i</span><span>n</span><span>B</span><span>o</span><span>x</span>
  </div>
  <div class="tagline">Войти в вечеринку</div>

  <div class="card">
    <div class="live-dot">Сервер работает</div>

    <div class="label">Код комнаты</div>
    <div class="input-wrap">
      <input
        id="roomCode"
        type="text"
        maxlength="4"
        placeholder="ABCD"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        inputmode="text"
      />
    </div>

    <div class="divider">твоё имя</div>

    <input
      class="name-input"
      id="playerName"
      type="text"
      maxlength="16"
      placeholder="Как тебя зовут?"
      autocomplete="off"
    />

    <button class="btn" id="joinBtn" onclick="joinGame()">
      🎉 Войти в игру
    </button>

    <div class="error" id="errorMsg">Введи код комнаты (4 буквы)</div>
  </div>

  <div class="footer">
    Нет игры? Попроси хоста запустить Jackbox<br>
    Игровой клиент: <a href="https://jackbox.fun" target="_blank">jackbox.fun</a>
  </div>
</div>

<script>
  // Generate stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `
      left: ${Math.random()*100}%;
      top: ${Math.random()*100}%;
      --dur: ${1.5 + Math.random()*3}s;
      animation-delay: ${Math.random()*3}s;
      width: ${2 + Math.random()*3}px;
      height: ${2 + Math.random()*3}px;
    `;
    starsEl.appendChild(s);
  }

  // Auto uppercase room code
  const codeInput = document.getElementById('roomCode');
  codeInput.addEventListener('input', () => {
    codeInput.value = codeInput.value.toUpperCase().replace(/[^A-Z]/g, '');
  });

  // Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') joinGame();
  });

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('roomCode').classList.add('shake');
    setTimeout(() => {
      document.getElementById('roomCode').classList.remove('shake');
    }, 400);
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  function confetti() {
    const colors = ['#ff3cac','#ffcc00','#00f5d4','#fff','#ff6b6b'];
    for (let i = 0; i < 30; i++) {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.cssText = `
        left: ${20 + Math.random()*60}%;
        top: 40%;
        background: ${colors[Math.floor(Math.random()*colors.length)]};
        animation-delay: ${Math.random()*0.3}s;
        animation-duration: ${0.8 + Math.random()*0.6}s;
        transform: rotate(${Math.random()*360}deg);
      `;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 1200);
    }
  }

  function joinGame() {
    const code = document.getElementById('roomCode').value.trim();
    const name = document.getElementById('playerName').value.trim();

    if (code.length !== 4) {
      showError('Код комнаты — 4 буквы!');
      return;
    }

    confetti();

    const btn = document.getElementById('joinBtn');
    btn.textContent = '🚀 Подключаемся...';
    btn.disabled = true;

    // Build jackbox.fun URL with room code
    let url = `https://jackbox.fun/?roomcode=${code}`;
    if (name) url += `&name=${encodeURIComponent(name)}`;

    setTimeout(() => {
      window.location.href = url;
    }, 600);
  }
</script>
</body>
    </html>
